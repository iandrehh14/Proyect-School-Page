{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SchoolProyect</title>
    <link rel="stylesheet" href="{% static 'css/login.css' %}?v={% now 'U' %}">
</head>
<body>

<div class="LoginBG">
    <div class="LoginCardBG">
        <div class="LoginCard">

            <div class="LoginHeader">
                <div class="LoginCrest">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 10L12 5 2 10l10 5 10-5Z"/>
                        <path d="M6 12v5c0 1.1 2.7 3 6 3s6-1.9 6-3v-5"/>
                    </svg>
                </div>
                <h1 id="SchoolName">Escuela Normal<br>Superior</h1>
            </div>

            <form method="post" action="{% url 'login' %}">
                {% csrf_token %}

                <div class="InputGroup">
                    <label for="id">Identificación</label>
                    <div class="InputWrap">
                        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="4" width="18" height="16" rx="2"/>
                            <circle cx="9" cy="10" r="2"/>
                            <path d="M15 8h3M15 12h3M6 16h12"/>
                        </svg>
                        <input id="id" name="identificacion" type="text" placeholder="Ej: 1234567890">
                    </div>
                </div>

                <div class="InputGroup">
                    <label for="email">Correo Electrónico</label>
                    <div class="InputWrap">
                        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="5" width="18" height="14" rx="2"/>
                            <path d="M3 7l9 6 9-6"/>
                        </svg>
                        <input id="email" name="username" type="email" placeholder="nombre@correo.com" required>
                    </div>
                </div>

                <div class="InputGroup">
                    <label for="pass">Contraseña</label>
                    <div class="InputWrap">
                        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="4" y="11" width="16" height="10" rx="2"/>
                            <path d="M8 11V7a4 4 0 0 1 8 0v4"/>
                        </svg>
                        <input id="pass" name="password" type="password" placeholder="••••••••" required>
                    </div>
                </div>

                <button type="submit" id="LoginBtn">
                    Iniciar Sesión
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M5 12h14M13 6l6 6-6 6"/>
                    </svg>
                </button>

            </form>

            <p class="LoginFooter">
                <span id="RegisterText">¿No tienes una cuenta?</span>
                <a id="RegisterBtn" href="#">Registrarse</a>
            </p>

        </div>
    </div>
</div>

</body>
</html>
